server {
    listen 80;
    server_name llm.dolkens.net llm.dolkens.au;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name llm.dolkens.net llm.dolkens.au;

    ssl_certificate     /etc/letsencrypt/live/llm.dolkens.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.dolkens.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 0;

    # WebSocket + streaming support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    resolver 127.0.0.11 valid=10s;
    set $upstream http://litellm:4000;

    location / {
        proxy_pass $upstream;
    }
}
