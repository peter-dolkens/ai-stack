server {
    listen 80;
    server_name frigate.dolkens.net frigate.dolkens.au;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name frigate.dolkens.net frigate.dolkens.au;

    ssl_certificate     /etc/letsencrypt/live/frigate.dolkens.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/frigate.dolkens.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # No body size limit — video exports can be large
    client_max_body_size 0;

    # Required for Frigate live view (WebSocket / go2rtc)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long timeouts for video streaming
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    resolver 127.0.0.11 valid=10s;
    set $upstream http://frigate:5000;

    location / {
        proxy_pass $upstream;
    }
}
