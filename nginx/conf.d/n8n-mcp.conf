server {
    listen 80;
    server_name mcp.dolkens.net mcp.dolkens.au;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.dolkens.net mcp.dolkens.au;

    ssl_certificate     /etc/letsencrypt/live/mcp.dolkens.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.dolkens.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;

    resolver 127.0.0.11 valid=10s;

    # n8n MCP server — add new servers as additional location blocks
    location /n8n/ {
        set $upstream http://n8n-mcp:3000;
        rewrite ^/n8n/(.*) /$1 break;
        proxy_pass $upstream;
    }
}
