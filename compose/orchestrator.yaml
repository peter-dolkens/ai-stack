name: orchestrator

# ── Shared volume (orchestrator + all agents) ─────────────────────────────────
volumes:
  ai-shared:
    name: ai-shared

# ── Agent network (orchestrator + all agents join this) ───────────────────────
networks:
  agent-net:
    name: agent-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.27.0.0/16

services:
  orchestrator:
    build:
      context: ../build/orchestrator
      dockerfile: Dockerfile
    image: orchestrator:local
    container_name: orchestrator
    hostname: orchestrator
    restart: unless-stopped

    networks:
      - agent-net

    volumes:
      # Docker socket — lets orchestrator spawn agent containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared workspace
      - ai-shared:/workspace/shared
      # Claude auth from host (subscription login persists here)
      - ~/.claude:/root/.claude

    # Generated by: bash /ai/build/orchestrator/setup.sh
    # Contains AUTHORIZED_KEYS — gitignored, never committed
    env_file:
      - path: /ai/build/orchestrator/orchestrator.env
        required: false

    environment:
      # Forward your API key if you have one; otherwise use `claude auth login`
      # after attaching VSCode to the container.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

    ports:
      # Expose SSH for VSCode Remote SSH (optional — attach-to-container also works)
      - "2222:22"

    # Keep stdin open for VSCode attachment
    stdin_open: true
    tty: true
