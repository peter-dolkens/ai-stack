name: monitoring

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - /ai/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /ai/prometheus/data:/prometheus
    networks:
      - monitoring
      - proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - /ai/grafana/data:/var/lib/grafana
      - /ai/grafana/provisioning:/etc/grafana/provisioning:ro
      - /ai/open-webui/webui.db:/var/lib/grafana/openwebui.db:ro
    env_file:
      - /ai/monitoring/.env
    environment:
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
    networks:
      - monitoring
      - proxy

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - '--docker_only=true'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring

  nvidia_gpu_exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.3.0
    container_name: nvidia_gpu_exporter
    restart: unless-stopped
    # Driver 580+ reports some metrics with unit suffixes in brackets (e.g. "[us]", "[ms]")
    # which are invalid Prometheus metric names. Restrict to safe fields only.
    command:
      - '--query-field-names=temperature.gpu,utilization.gpu,utilization.memory,memory.total,memory.free,memory.used,power.draw,power.limit,fan.speed,clocks.current.graphics,clocks.current.memory,clocks.current.sm,pstate,encoder.stats.sessionCount,encoder.stats.averageFps,encoder.stats.averageLatency'
    devices:
      - nvidia.com/gpu=all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    networks:
      - monitoring

  ollama_exporter:
    image: lucabecker42/ollama-exporter:latest
    container_name: ollama_exporter
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=host.docker.internal:11434
      - PORT=8000
      - INTERVAL=30
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://nginx:8080/stub_status'
    networks:
      - monitoring
      - proxy

  whisper_exporter:
    image: whisper-exporter:local
    container_name: whisper_exporter
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

  piper_exporter:
    image: piper-exporter:local
    container_name: piper_exporter
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

networks:
  monitoring:
    name: monitoring
  proxy:
    external: true
    name: proxy
