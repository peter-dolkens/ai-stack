name: openwebui

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - /ai/open-webui:/app/backend/data
    env_file:
      - /ai/open-webui/.env
    environment:
      # LiteLLM proxy — set OPENAI_API_KEY in open-webui/.env to LITELLM_MASTER_KEY from litellm/.env.
      - OPENAI_API_BASE_URL=http://litellm:4000
      - ENABLE_OLLAMA_API=false
      # RAG embedding via LiteLLM
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - RAG_OPENAI_API_BASE_URL=http://litellm:4000
      - ENABLE_OAUTH_SIGNUP=false
      - ENABLE_LOGIN_FORM=false
      - OAUTH_PROVIDER_NAME=Google
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  proxy:
    external: true
    name: proxy
