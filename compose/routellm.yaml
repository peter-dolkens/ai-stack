name: routellm

services:
  routellm:
    image: routellm:local
    container_name: routellm
    restart: unless-stopped
    env_file:
      - /ai/routellm/.env
    environment:
      # Cache HuggingFace model weights (MF router) across restarts
      - HF_HOME=/cache
    volumes:
      - /ai/routellm/cache:/cache
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1', 6060)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  proxy:
    external: true
    name: proxy
