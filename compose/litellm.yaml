name: litellm

services:
  litellm:
    image: litellm:local
    container_name: litellm
    restart: unless-stopped
    volumes:
      - /ai/litellm/config.template.yaml:/litellm/config.template.yaml:ro
    env_file:
      - /ai/litellm/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy
      - postgres
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  proxy:
    external: true
    name: proxy
  postgres:
    external: true
    name: postgres
