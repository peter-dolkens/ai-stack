name: n8n

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    networks:
      - proxy
      - postgres
    volumes:
      - /ai/n8n/data:/home/node/.n8n
    env_file:
      - /ai/n8n/.env
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=postgres
      - N8N_HOST=n8n.dolkens.net
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.dolkens.au/
      - N8N_EDITOR_BASE_URL=https://n8n.dolkens.net
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_DEFAULT_METRICS=true
      - N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL=true
      - N8N_METRICS_INCLUDE_NODE_TYPE_LABEL=true
      - N8N_METRICS_INCLUDE_API_ENDPOINTS=true
      - N8N_METRICS_INCLUDE_API_STATUS_CODE_LABEL=true
      - N8N_METRICS_INCLUDE_EXECUTION_STATUS_LABEL=true
      - N8N_METRICS_INCLUDE_MESSAGE_EVENT_BUS_METRICS=true
      - N8N_METRICS_INCLUDE_WORKFLOW_STATISTICS=true
      - N8N_LICENSE_ACTIVATION_KEY=537a441e-2d2d-4923-914c-4e3d3b23121f
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  n8n-oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: n8n-oauth2-proxy
    restart: unless-stopped
    networks:
      - proxy
    env_file:
      - /ai/n8n/.env
    environment:
      - OAUTH2_PROXY_PROVIDER=google
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_UPSTREAMS=http://n8n:5678
      # Allow any Google account — restrict with your domain, e.g. OAUTH2_PROXY_EMAIL_DOMAINS=gmail.com
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_COOKIE_SECURE=true
      - OAUTH2_PROXY_COOKIE_HTTPONLY=true
      - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
    # Skip auth for n8n webhook paths so external services can trigger workflows
    command:
      - --skip-auth-route=^/webhook/
      - --skip-auth-route=^/webhook-test/
      - --skip-auth-route=^/webhook-waiting/
    depends_on:
      n8n:
        condition: service_healthy

networks:
  proxy:
    external: true
    name: proxy
  postgres:
    external: true
    name: postgres
