name: whisper

services:
  whisper:
    image: wyoming-whisper:local
    container_name: whisper
    restart: unless-stopped
    ports:
      - "10300:10300"
    volumes:
      - /ai/models/whisper:/data
    devices:
      - nvidia.com/gpu=all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    command: >
      --uri tcp://0.0.0.0:10300
      --model distil-large-v3
      --language en
      --device cuda
      --data-dir /data
      --download-dir /data
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1', 10300)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
