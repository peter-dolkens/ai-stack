name: gitea

services:
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    networks:
      - proxy
      - postgres
    ports:
      - "2222:22"
    volumes:
      - /ai/gitea/data:/data
    env_file:
      - /ai/gitea/.env
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=postgres
      - GITEA__server__DOMAIN=git.dolkens.net
      - GITEA__server__ROOT_URL=https://git.dolkens.au
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_DOMAIN=git.dolkens.net
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__SSH_LISTEN_PORT=22
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=false
      - GITEA__service__ALLOW_ONLY_EXTERNAL_REGISTRATION=true
      - GITEA__service__SHOW_REGISTRATION_BUTTON=false
      - GITEA__service__ENABLE_PASSWORD_SIGNIN_FORM=false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  proxy:
    external: true
    name: proxy
  postgres:
    external: true
    name: postgres
