global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'nvidia_gpu'
    static_configs:
      - targets: ['nvidia_gpu_exporter:9835']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx_exporter:9113']

  # Frigate native Prometheus metrics
  - job_name: 'frigate'
    static_configs:
      - targets: ['frigate:5000']
    metrics_path: /api/metrics

  # Ollama model inventory (installed models, VRAM sizes)
  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama_exporter:8000']

  # Ollama running models — currently loaded in memory, VRAM usage, context length
  - job_name: 'ollama_ps'
    static_configs:
      - targets: ['ollama_ps_exporter:9879']

  # Whisper STT — health + transcription metrics
  - job_name: 'whisper'
    static_configs:
      - targets: ['whisper_exporter:9877']

  # Piper TTS — health metrics
  - job_name: 'piper'
    static_configs:
      - targets: ['piper_exporter:9878']

  # LiteLLM proxy — token counts, latency, cost, errors per model
  - job_name: 'litellm'
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: /metrics

  # PostgreSQL — database sizes, connections, transaction rates, cache hit ratio
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  # n8n workflow automation — active workflows, executions, HTTP API, Node.js runtime
  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n.proxy:5678']
    metrics_path: /metrics
