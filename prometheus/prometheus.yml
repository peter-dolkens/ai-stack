global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'nvidia_gpu'
    static_configs:
      - targets: ['nvidia_gpu_exporter:9835']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx_exporter:9113']

  # Frigate native Prometheus metrics
  - job_name: 'frigate'
    static_configs:
      - targets: ['frigate:5000']
    metrics_path: /api/metrics

  # Ollama model inventory, VRAM usage, running models
  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama_exporter:8000']
